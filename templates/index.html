<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Prediction AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-bg { background: #0d6efd; color: white; padding: 20px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="card col-lg-8 mx-auto">
            <div class="header-bg text-center">
                <h2>Stroke Prediction Portal</h2>
                <p>Input patient data to assess risk factors</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" class="row g-3">
                    <h5 class="mt-3 text-primary border-bottom pb-2">Demographics</h5>
                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" name="age" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select" name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Residence Type</label>
                        <select class="form-select" name="residence_type">
                            <option value="Urban">Urban</option>
                            <option value="Rural">Rural</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Work Type</label>
                        <select class="form-select" name="work_type">
                            <option value="Private">Private</option>
                            <option value="Self-employed">Self-employed</option>
                            <option value="Government job">Government job</option>
                            <option value="Children">Children</option>
                            <option value="Never Worked">Never Worked</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ever Married</label>
                        <select class="form-select" name="ever_married" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <h5 class="mt-4 text-primary border-bottom pb-2">Clinical Metrics</h5>
                    <div class="col-md-6">
                        <label class="form-label">Avg Glucose Level</label>
                        <input type="number" step="0.01" class="form-control" name="avg_glucose_level" min="40" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">BMI</label>
                        <input type="number" step="0.1" class="form-control" name="bmi" min="20" max="80" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hypertension</label>
                        <select class="form-select" name="hypertension">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Heart Disease</label>
                        <select class="form-select" name="heart_disease">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Smoking Status</label>
                        <select class="form-select" name="smoking_status">
                            <option value="Never Smoked">Never Smoked</option>
                            <option value="Formerly Smoked">Formerly Smoked</option>
                            <option value="Smokes">Smokes</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary w-100 py-2">Run Analysis</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
